                if (crmId && sType === 'income') {
                    db.collection('customers').doc(crmId).set({
                        name: cName, phone: sPhone, lastChannel: sChannel,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, {merge: true});
                }

                db.collection('sales').add({ 
                    item: (sQty > 1 ? '('+sQty+'個) ' : '') + i, price: p, cost: finalCost, profit: finalProfit, 
                    type: sType, customer: cName, phone: sPhone, channel: sChannel, spec: sSpec,
                    isSettled: !isT, 
                    paymentMethod: (sType === "income" ? payType : null), 
                    createdAt: firebase.firestore.Timestamp.fromDate(curDate) 
                }).then(function() {
                    var webhookUrl = "https://hook.us2.make.com/7vyd116ojl12kesn40ftisc0u2gp44pz"; 
                    if(webhookUrl && webhookUrl.indexOf("http") === 0) {
                        var msgType = sType === 'income' ? (payType === 'cash' ? '💵 門市現金' : '🌐 網路轉帳') : '💸 營運支出';
                        var msg = "📝 YESPC 新增帳務\n類型：" + msgType + "\n通路：" + sChannel + "\n項目：" + i + "\n金額：$" + p.toLocaleString();
                        fetch(webhookUrl, { mode: 'no-cors', method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: msg}) }).catch(function(e){ console.log('LINE發送失敗', e) });
                    }
                });

                if (doSync && sType === 'income') {
                    var ridStr = 'S' + dVal.slice(2).replace(/-/g,'') + '-00' + Math.floor(1000 + Math.random() * 9000).toString().substring(0,4);
                    db.collection('repairs').add({
                        mode: 'purchase', repairId: ridStr, entryDate: dVal, customer: cName, phone: sPhone,
                        model: (sQty > 1 ? '('+sQty+'個) ' : '') + i, price: p, status: '已成交', channel: sChannel,
                        spec: sSpec,
                        createdAt: firebase.firestore.Timestamp.fromDate(curDate)
                    });
                }

                ['SI','SP','SC','SCu', 'SPh', 'SSpec'].forEach(function(k){ var el = document.getElementById(k); if(el) el.value = ''; });
                if(sSyncEl) sSyncEl.checked = false; 
                setSelStockItem(null); setSuggestions([]); setSQty(1);
            };

            var saveSaleEdit = function(id){
                if(sEdit.item.trim()){
                    var p = parseFloat(sEdit.price)||0; 
                    var c = parseFloat(sEdit.cost)||0;
                    var _nowTime = new Date().toTimeString().split(' ')[0];
                    var finalDate = sEdit.date ? new Date(sEdit.date + 'T' + _nowTime) : new Date();

                    db.collection('sales').doc(id).update({ 
                        item: sEdit.item, 
                        price: p, 
                        cost: c, 
                        profit: p-c, 
                        paymentMethod: sEdit.paymentMethod || 'cash', 
                        customer: sEdit.customer,
                        phone: sEdit.phone,
                        spec: sEdit.spec,
                        createdAt: firebase.firestore.Timestamp.fromDate(finalDate) 
                    });
                }
                setSEdit({id:null, item:'', price:'', cost:'', date:'', customer:'', phone:'', spec:''});
            };

            var updateSettings = function(id, val, isAdd, idx){
                var cur = [];
                if(id==='staffList') cur = staffs;
                else if(id==='tagList') cur = tags;
                else if(id==='stockTagList') cur = stTags;
                else if(id==='supplierList') cur = suppliers;
                else if(id==='crmCategoryList') cur = crmCategories; 
                else cur = ckL;

                var nxt;
                if(isAdd){ 
                    if(!val.trim()) return; 
                    nxt = Array.from(new Set(cur.concat([val.trim()]))); 
                } else if(idx !== undefined && idx !== null){ 
                    if(val === null){ 
                        nxt = cur.filter(function(_, i){ return i !== idx; }); 
                    } else { 
                        nxt = cur.map(function(x, i){ return i === idx ? val.trim() : x; }); 
                    } 
                }
                db.collection('settings').doc(id).set({list:nxt});
            };

            var saveAdminEdit = function(){ if(aEdit.newVal.trim()){ updateSettings(aEdit.listId, aEdit.newVal, false, aEdit.index); } setAEdit({listId:null, index:null, newVal:''}); };
            var saveServiceFieldConfig = function(list){ var normalized = list.map(function(f, idx){ return (typeof f === 'string') ? { id: 'cf_' + Date.now() + '_' + Math.random().toString(36).slice(2,6), label: f } : f; }).filter(function(f){ return f && String(f.label||'').trim(); }).map(function(f){ return Object.assign({}, f, { label: String(f.label||'').trim() }); }); var seenBase = {}; var seenCustomLabel = {}; normalized = normalized.filter(function(f){ if(String(f.id||'').indexOf('cf_') === 0){ var k = String(f.label||'').trim(); if(!k) return false; if(seenCustomLabel[k]) return false; seenCustomLabel[k] = true; return true; } var k2 = String(f.id||''); if(seenBase[k2]) return false; seenBase[k2] = true; return true; }); db.collection('settings').doc('serviceFieldConfig').set({list:normalized}); };
            var addServiceField = function(){ var labelEl = document.getElementById('SFC_LABEL'); if(!labelEl || !labelEl.value.trim()) return alert('欄位名稱必填'); var safeId = 'cf_' + Date.now(); var next = svcFields.concat([{ id:safeId, label:labelEl.value.trim() }]); saveServiceFieldConfig(next); labelEl.value=''; };
            var getVisibleServiceFields = function(){ return svcFields.filter(function(f){ return f && f.label && String(f.id||'').indexOf('cf_') === 0; }); };
            var getCustomFieldValue = function(fid){ return (rForm.custom && rForm.custom[fid]) || ''; };
            var setCustomFieldValue = function(fid, val){ var cur = Object.assign({}, rForm.custom || {}); cur[fid] = val; setRForm(Object.assign({}, rForm, {custom: cur})); };
            var resetRForm = function(mode){ setRForm({date:getTWDate(), mode:mode || 'repair', rid:'', nm:'', company:'', ph:'', addr:'', em:'', mo:'', spec:'', sn:'', ds:'', pr:0, dp:0, pay:'cash', status:(mode||'repair')==='purchase'?'已成交':'待檢測', custom:{}}); setChecks([]); };
            
            var saveServiceRecord = function(){
                if(!rForm.nm.trim() || !rForm.ph.trim()) return alert('姓名與電話必填');
                if(!rForm.mo.trim()) return alert(rForm.mode === 'purchase' ? '購買品項必填' : '維修機型必填');
                
                var rChEl = document.getElementById('RCh');
                var sChannel = rChEl ? rChEl.value : '門市';

                var crmId = (rForm.ph && rForm.ph.length >= 4) ? rForm.ph : ((rForm.nm && rForm.nm !== '一般' && rForm.nm.length >= 2) ? 'NAME_' + rForm.nm : null);
                if (crmId) {
                    db.collection('customers').doc(crmId).set({
                        name: rForm.nm, phone: rForm.ph, company: rForm.company || '', address: rForm.addr || '', email: rForm.em || '', lastChannel: sChannel,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, {merge: true});
                }

                var customData = {};
                getVisibleServiceFields().forEach(function(f){ customData[f.id] = getCustomFieldValue(f.id); });
                var payload = { mode: rForm.mode, repairId: rForm.mode === 'repair' ? ('Y' + rForm.date.slice(2).replace(/-/g,'') + '-00' + (rForm.rid || '0000')) : ('S' + rForm.date.slice(2).replace(/-/g,'') + '-00' + (rForm.rid || '0000')), entryDate: rForm.date, customer: rForm.nm, phone: rForm.ph, company: rForm.company || '', address: rForm.addr || '', email: rForm.em || '', model: rForm.mo, spec: rForm.spec || '', sn: rForm.sn || '', checks: rForm.mode === 'repair' ? checks : [], description: rForm.ds || '', price: parseFloat(rForm.pr)||0, deposit: parseFloat(rForm.dp)||0, paymentMethod: rForm.mode === 'purchase' ? (rForm.pay || 'cash') : null, status: rForm.status || (rForm.mode === 'purchase' ? '已成交' : '待檢測'), channel: sChannel, customFields: customData, createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                db.collection('repairs').add(payload).then(function(){ 
                    resetRForm(rForm.mode); 
                });
            };

            var rebuildMissingSettlements = function() { 
                db.collection('sales').where('isSettled', '==', true).get().then(function(sn) { 
                    var sData = {}; 
                    sn.docs.forEach(function(d){ 
                        var dat=d.data(); 
                        if(dat.createdAt){ 
                            var dStr = getTWDate(dat.createdAt.toDate()); 
                            if(!sData[dStr]){ sData[dStr]={revenue:0, expense:0, onlineRevenue:0}; } 
                            if(dat.type==='expense'){ sData[dStr].expense += Number(dat.price)||0; } 
                            else { 
                                sData[dStr].revenue += Number(dat.price)||0; 
                                if(dat.paymentMethod==='online'){ sData[dStr].onlineRevenue += Number(dat.price)||0; } 
                            } 
                        } 
                    }); 
                    var existingDates = settlements.map(function(st){ return st.date; }); 
                    var missingDates = Object.keys(sData).filter(function(dStr){ return !existingDates.includes(dStr); }); 
                    if(missingDates.length === 0){ return alert('掃描完畢：沒有遺漏。'); } 
                    var batch = db.batch(); 
                    missingDates.forEach(function(md){ 
                        var dat = sData[md]; 
                        var finalCashTurnedIn = (dat.revenue - dat.onlineRevenue - dat.expense);
                        batch.set(db.collection('dailySettlements').doc(), { 
                            date: md, revenue: dat.revenue, expense: dat.expense, onlineRevenue: dat.onlineRevenue, 
                            cashTurnedIn: finalCashTurnedIn, 
                            createdAt: firebase.firestore.Timestamp.fromDate(new Date(md+'T23:59:59')) 
                        }); 
                    }); 
                    batch.commit().then(function(){ alert('成功補建 ' + missingDates.length + ' 張歷史結算單！'); }); 
                }); 
            };

            var finalizeDaily = function(dRCash, dRNet, dRTotal, dE, cashInHand, dSales){
                if(!dSales || dSales.length === 0) return alert('今日尚無待結帳資料');
                var finalCashOut = dRCash - dE;
                
                if(!confirm("確定要執行每日結帳？\n---\n今日現金單總計：$" + dRCash.toLocaleString() + "\n💸 當日支出總計：$" + dE.toLocaleString() + "\n🚀 應繳回現金：$" + finalCashOut.toLocaleString())) return;
                
                var batch = db.batch();
                dSales.forEach(function(s){ batch.update(db.collection('sales').doc(s.id), { isSettled: true }); });
                db.collection('dailySettlements').add({ 
                    date: getTWDate(), 
                    revenue: dRTotal, 
                    expense: dE, 
                    cashTurnedIn: finalCashOut, 
                    onlineRevenue: dRNet, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                }).then(function(){ return batch.commit(); }).then(function(){ alert('結帳完成，金額已永久存檔。'); });
            };
            
            var saveStockEdit = function(){
                if(!stEdit.name.trim()) return;
                db.collection('stocks').doc(stEdit.id).update({ name: stEdit.name, category: stEdit.category, sn: stEdit.sn, supplier: stEdit.supplier, cost: parseFloat(stEdit.cost)||0, price: parseFloat(stEdit.price)||0, qty: parseInt(stEdit.qty)||0 });
                setStEdit({id:null});
            };

            if(!user) return e('div', {className:'h-screen flex items-center justify-center font-bold text-slate-400 bg-white text-center'}, 'YESPC 系統啟動中...');

            var sharedProps = {
                user: user, isOwner: isOwner, tab: tab, setTab: setTab, search: search, setSearch: setSearch,
                todos: todos, sales: sales, repairs: repairs, stocks: stocks, settlements: settlements, customers: customers,
                staffs: staffs, tags: tags, ckL: ckL, stTags: stTags, suppliers: suppliers, svcFields: svcFields, svcBaseFields: svcBaseFields,
                crmCategories: crmCategories, 
                edit: edit, setEdit: setEdit, sEdit: sEdit, setSEdit: setSEdit,
                sType: sType, setSType: setSType, payType: payType, setPayType: setPayType,
                aEdit: aEdit, setAEdit: setAEdit, tTagEdit: tTagEdit, setTTagEdit: setTTagEdit,
                expId: expId, setExpId: setExpId, rForm: rForm, setRForm: setRForm,
                showPriv: showPriv, setShowPriv: setShowPriv, selMonth: selMonth, setSelMonth: setSelMonth,
                suggestions: suggestions, setSuggestions: setSuggestions, selStockItem: selStockItem, setSelStockItem: setSelStockItem,
                autoStock: autoStock, setAutoStock: setAutoStock, stEdit: stEdit, setStEdit: setStEdit, sQty: sQty, setSQty: setSQty,
                histDetail: histDetail, loadHistDetail: loadHistDetail,
                addTodo: addTodo, saveTodoEdit: saveTodoEdit, addSale: addSale, saveSaleEdit: saveSaleEdit,
                updateSettings: updateSettings, saveAdminEdit: saveAdminEdit, saveServiceFieldConfig: saveServiceFieldConfig,
                addServiceField: addServiceField, getVisibleServiceFields: getVisibleServiceFields,
                getCustomFieldValue: getCustomFieldValue, setCustomFieldValue: setCustomFieldValue,
                saveServiceRecord: saveServiceRecord, rebuildMissingSettlements: rebuildMissingSettlements, finalizeDaily: finalizeDaily, saveStockEdit: saveStockEdit,
                checks: checks, setChecks: setChecks
            };

            var content;
            if (tab === 'portal') content = e(PortalModule, sharedProps);
            else if (tab === 'repair') content = e(RepairModule, sharedProps);
            else if (tab === 'sales') content = e(SalesModule, sharedProps);
            else if (tab === 'crm') content = e(CrmModule, sharedProps); 
            else if (tab === 'stock') content = e(StockModule, sharedProps);
            else if (tab === 'admin') content = e(AdminModule, sharedProps);
            else content = e(BoardModule, sharedProps);

            return e('div', {className: 'flex flex-col h-screen overflow-hidden text-left bg-slate-50 font-black'}, [
                e('header', {className: 'bg-white border-b py-4 px-4 flex justify-between items-center sticky top-0 z-20 shadow-sm text-left font-black'}, [
                    e('div',{onClick:toggleOwner, className:'font-black text-slate-800 tracking-tighter text-left cursor-pointer flex items-center gap-1 font-black'}, [ 'YESPC OS v5.9.9 Safe-Delete', isOwner ? e('span',{className:'text-rose-500 text-xs font-black'},'👑 店主模式') : e('span',{className:'text-blue-500 text-[10px] font-black font-black'},'ENTERPRISE') ]),
                    (tab === 'board' || tab === 'sales' || tab === 'repair' || tab === 'stock' || tab === 'crm') ? e('input', {className:'bg-gray-100 rounded-full px-3 py-1 text-xs outline-none w-24 font-black text-left font-sans text-left font-black', placeholder:'🔍 搜尋...', value:search, onChange: function(ev){ setSearch(ev.target.value.toLowerCase()); }}) : null,
                    tab !== 'board' ? e('button', {onClick:function(){setTab('board')}, className:'bg-slate-100 p-2 rounded-full font-black text-xs h-8 w-8 flex items-center justify-center text-center transition-all active:bg-slate-200 font-black font-black'}, '📋') : null
                ]),
                e('main', {className: 'flex-1 overflow-y-auto mobile-safe text-left font-black font-black'}, e(ErrorBoundary, null, content)),
                
                e('footer', {className:'bg-white border-t py-1 overflow-hidden sticky bottom-0 z-20 shadow-inner px-1 flex justify-around text-left mobile-safe font-black'}, [
                    e('button',{onClick:function(){setTab('portal')},className:'nav-btn '+(tab==='portal'?'nav-btn-active font-black font-black':'')},[e('span',{className:'text-xl text-center'},'🏠'), e('span',{className:'text-[8px] font-black font-black font-black'},'入口')]),
                    e('button',{onClick:function(){setTab('board')},className:'nav-btn '+(tab==='board'?'nav-btn-active font-black font-black':'')},[e('span',{className:'text-xl text-center'},'📋'), e('span',{className:'text-[8px] font-black font-black font-black'},'白板')]),
                    e('button',{onClick:function(){setTab('sales')},className:'nav-btn '+(tab==='sales'?'nav-btn-active font-black font-black':'')},[e('span',{className:'text-xl text-center'},'💰'), e('span',{className:'text-[8px] font-black font-black font-black'},'財務')]),
                    e('button',{onClick:function(){setTab('repair')},className:'nav-btn '+(tab==='repair'?'nav-btn-active font-black font-black':'')},[e('span',{className:'text-xl text-center'},'🛠️'), e('span',{className:'text-[8px] font-black font-black font-black'},'維修')]),
                    e('button',{onClick:function(){setTab('crm')},className:'nav-btn '+(tab==='crm'?'nav-btn-active font-black text-rose-500':'')},[e('span',{className:'text-xl text-center'},'👥'), e('span',{className:'text-[8px] font-black font-black font-black'},'客戶')]),
                    e('button',{onClick:function(){setTab('stock')},className:'nav-btn '+(tab==='stock'?'nav-btn-active font-black font-black':'')},[e('span',{className:'text-xl text-center'},'📦'), e('span',{className:'text-[8px] font-black font-black font-black'},'零件')]),
                    e('button',{onClick:function(){setTab('admin')},className:'nav-btn '+(tab==='admin'?'nav-btn-active font-black font-black font-black':'')},[e('span',{className:'text-xl text-center font-black'},'⚙️'), e('span',{className:'text-[8px] font-black font-black font-black'},'管理')])
                ])
            ]);
        }
        var root = ReactDOM.createRoot(document.getElementById('root')); root.render(e(App));
    </script>
